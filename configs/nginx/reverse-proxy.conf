# configs/nginx/reverse-proxy.conf
# Nginx как Reverse Proxy + Load Balancer для двух Apache backend'ов
# Соответствует "F" и "B" на вашей схеме

upstream backend {
    # Round-robin балансировка (можно изменить на least_conn или ip_hash)
    server 127.0.0.1:8080;   # Backend 1 (Apache на master)
    server 127.0.0.1:8080;   # Backend 2 (Apache на slave — через сеть, но для простоты пока оба локально; в реальности slave отдельно)
    # Если slave на другом IP: server 192.168.88.167:8080;
}

server {
    listen 80 default_server;
    server_name _;   # или ваш домен

    # Логи (будут отправляться в ELK через Filebeat)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Для WordPress (перенаправление заголовков, большие запросы)
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 64m;
    }

    # Статические файлы можно кэшировать, но для простоты отдаём backend'ам
}
